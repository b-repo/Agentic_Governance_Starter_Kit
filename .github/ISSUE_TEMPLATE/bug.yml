name: Bug
description: Report a defect that should be tracked in ISSUE_LEDGER.json.
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
    validations:
      required: true
